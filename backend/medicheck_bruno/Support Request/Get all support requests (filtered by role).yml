info:
  name: Get all support requests (filtered by role)
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/support-requests?status=pending"
  params:
    - name: status
      value: pending
      type: query
    - name: status
      value: accepted
      type: query
      disabled: true
    - name: status
      value: declined
      type: query
      disabled: true
    - name: status
      value: completed
      type: query
      disabled: true
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
