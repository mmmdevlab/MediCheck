info:
  name: Create support request (patient)
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/support-requests"
  body:
    type: json
    data: |-
      {
        "appointmentId": 501,
        "caregiverId": 2,
        "requestType": "transport",
        "message": "Need a ride to the clinic"
      }
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
