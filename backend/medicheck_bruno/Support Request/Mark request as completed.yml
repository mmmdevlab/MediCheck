info:
  name: Mark request as completed
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{BASE_URL}}/support-requests/:id/complete"
  headers:
    - name: Authorization
      value: Bearer {{caregiver_token}}
  params:
    - name: id
      value: ""
      type: path
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
