info:
  name: View Patient Tasks
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/patients/:patientId/tasks"
  params:
    - name: patientId
      value: "1"
      type: path
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
