info:
  name: View Appointments - No Access (403)
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/patients/1/appointments"
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api
  scripts:
    - type: tests
      code: |-
        test("Returns appointments", function() {
            expect(res.getStatus()).to.equal(200);
            expect(res.getBody().appointments).to.be.an('array');
          });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
