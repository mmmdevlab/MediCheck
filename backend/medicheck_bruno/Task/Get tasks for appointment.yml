info:
  name: Get tasks for appointment
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/appointments/:appointmentId/tasks"
  params:
    - name: appointmentId
      value: "1"
      type: path
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api
  scripts:
    - type: tests
      code: |-
        test("Tasks fetched", function() {
                  expect(res.getStatus()).to.equal(200);
                  expect(res.getBody()).to.be.an('array');
                });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
