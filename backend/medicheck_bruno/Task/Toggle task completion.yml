info:
  name: Toggle task completion
  type: http
  seq: 3

http:
  method: PUT
  url: "{{BASE_URL}}/tasks/:taskId/toggle"
  params:
    - name: taskId
      value: "1"
      type: path
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api
  scripts:
    - type: tests
      code: |-
        test("Task toggled", function() {
          expect(res.getStatus()).to.equal(200);
          expect(res.getBody().task).to.have.property('isCompleted');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
