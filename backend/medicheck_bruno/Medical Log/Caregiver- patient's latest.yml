info:
  name: "Caregiver: patient's latest"
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/logs/patients/:patientId/latest"
  headers:
    - name: Authorization
      value: Bearer {{caregiver_token}}
  params:
    - name: patientId
      value: "{{patient_token}}"
      type: path
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
