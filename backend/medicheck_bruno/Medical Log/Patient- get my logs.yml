info:
  name: "Patient: get my logs"
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/logs?days=7"
  params:
    - name: days
      value: "7"
      type: query
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
