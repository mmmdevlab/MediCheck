info:
  name: View patient's health logs (caregiver)
  type: http
  seq: 7

http:
  method: GET
  url: "{{BASE_URL}}/patients/:patientId/logs?days=7"
  params:
    - name: patientId
      value: "1"
      type: path
    - name: days
      value: "7"
      type: query
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
