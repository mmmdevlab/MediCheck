info:
  name: View patient's appointments (caregiver, read-only)
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/patients/:patientId/appointments"
  params:
    - name: patientId
      value: ""
      type: path
  auth: inherit

runtime:
  variables:
    - name: BASE_URL
      value: http://localhost:3000/api

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
